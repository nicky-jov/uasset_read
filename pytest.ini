[pytest]
testpaths = tests
pythonpath = src
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: 需要外部样本资产或较慢路径的集成测试
    quality: C++ 输出质量门禁测试
    regression: 真实资产回归测试
    slow: 需要大量时间或全量资产扫描的慢速测试
    auxiliary: 辅助/历史回归测试，默认单元层不包含
    acceptance: 最终验收测试，证明产品目标达成
